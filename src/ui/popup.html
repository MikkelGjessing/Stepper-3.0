<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stepper 3.0</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header (Sticky) -->
    <header class="header">
      <h1 class="title">Stepper 3.0</h1>
      <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
    </header>
    
    <!-- Fallback message when JavaScript is disabled -->
    <noscript>
      <div style="padding: 20px; text-align: center; color: #666;">
        <p>⚠️ JavaScript is required for this extension to work.</p>
        <p>Please enable JavaScript in your browser.</p>
      </div>
    </noscript>

    <!-- Case Not Started View -->
    <div id="caseNotStartedView" class="view-container" style="display: none;">
      <div class="case-not-started-content">
        <p class="case-not-started-tagline">Ready to help. Start a case to begin.</p>
        <button class="primary-btn case-start-btn" id="startCaseBtn">Start case</button>
      </div>
    </div>

    <!-- Case Start Modal Overlay -->
    <div id="caseStartModal" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="caseStartModalTitle">
      <div class="modal-panel">
        <h2 class="modal-title" id="caseStartModalTitle">Before you start</h2>
        <div class="modal-body" id="caseStartModalBody">
          <!-- Case start instructions loaded from config/case_start_text.md -->
        </div>
        <div class="modal-actions">
          <button class="secondary-btn" id="caseStartCancelBtn">Cancel</button>
          <button class="primary-btn" id="caseStartConfirmBtn">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Case Conclude Modal Overlay -->
    <div id="caseConcludeModal" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="caseConcludeModalTitle">
      <div class="modal-panel modal-panel-wide">
        <h2 class="modal-title" id="caseConcludeModalTitle">Case summary</h2>
        <div class="modal-body" id="caseConcludeModalBody">
          <!-- Summary generated by JS -->
        </div>
        <div class="modal-actions">
          <button class="secondary-btn" id="caseCopySummaryBtn">📋 Copy summary</button>
          <button class="primary-btn" id="caseConcludeCloseBtn">Close case</button>
        </div>
      </div>
    </div>

    <!-- Search View -->
    <div id="searchView" class="view-container" style="display: none;">
      <!-- Search Input -->
      <div class="search-section">
        <div class="search-container">
          <input 
            type="text" 
            id="searchInput" 
            class="search-input" 
            placeholder="Ask me anything or search for guides..."
            autocomplete="off"
          />
          <button class="search-btn" id="searchBtn">🔍</button>
        </div>
      </div>

      <!-- Welcome Message (shown before first search) -->
      <div id="welcomeMessage" class="welcome-message">
        <p>👋 Welcome to Stepper 3.0!</p>
        <p>Search for step-by-step guides to get started.</p>
      </div>

      <!-- Results List (shown after search) -->
      <div class="results-content" id="resultsContent" style="display: none;">
        <div class="panel-header">
          <h2>Search Results</h2>
          <span class="result-count" id="resultCount">0 articles</span>
        </div>
        <div class="results-list" id="resultsList">
        </div>
      </div>

      <!-- Case Active: Completed Instructions Overview -->
      <div id="caseActiveOverview" class="case-active-overview" style="display: none;">
        <div class="case-overview-header">
          <h2 class="case-overview-title">Completed instructions</h2>
        </div>
        <div id="completedInstructionsList" class="completed-instructions-list">
          <p class="case-empty-state">No completed instructions yet.</p>
        </div>
        <div class="case-conclude-row">
          <button class="primary-btn conclude-case-btn" id="concludeCaseBtn">Conclude case</button>
        </div>
      </div>
    </div>

    <!-- Article View (Step-by-step mode) -->
    <div id="articleView" class="view-container" style="display: none;">
      <div id="articleHeader" class="article-step-header"></div>
      <div id="articleContentScrollable" class="article-step-content"></div>
      <div id="articleFooter" class="article-step-footer">
        <div id="articleNavContainer"></div>
        <div id="stepCounter" class="step-counter-label"></div>
      </div>
    </div>

    <!-- Full Article View -->
    <div id="fullArticleView" class="view-container" style="display: none;">
      <div class="full-article-content-scrollable" id="fullArticleContentScrollable">
        <!-- Full article content will be dynamically inserted here -->
      </div>
    </div>

    <!-- Complete View (Completion Summary) -->
    <div id="completeView" class="view-container" style="display: none;">
      <div class="complete-content-scrollable" id="completeContentScrollable">
        <!-- Completion summary will be dynamically inserted here -->
      </div>
    </div>

    <!-- Footer (Sticky) – contains the Ask Stepper trigger; hidden when chat is disabled -->
    <footer class="footer" id="mainFooter" style="display:none;">
      <button class="footer-btn footer-btn-primary" id="chatTriggerBtn" aria-label="Open Ask Stepper chat">
        💬 Ask Stepper
      </button>
    </footer>

    <!-- Chat Drawer -->
    <div class="chat-drawer" id="chatDrawer" aria-hidden="true">
      <div class="chat-drawer-header">
        <div class="chat-drawer-header-left">
          <span class="chat-drawer-title">Ask Stepper</span>
          <span class="chat-context-label" id="chatContextLabel">Asking Stepper knowledge base</span>
        </div>
        <div class="chat-drawer-header-right">
          <button class="chat-mode-switch" id="chatModeSwitch" style="display:none;"></button>
          <button class="chat-drawer-resize" id="chatDrawerResize" title="Expand / Shrink" aria-label="Toggle drawer size">⤢</button>
          <button class="chat-drawer-close" id="chatDrawerClose" title="Close chat" aria-label="Close chat">✕</button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages" role="log" aria-live="polite">
        <!-- Messages rendered by JS -->
      </div>

      <div class="chat-input-row">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="Ask a question…"
          rows="1"
          aria-label="Chat message input"
        ></textarea>
        <button class="chat-send-btn" id="chatSendBtn" aria-label="Send message">➤</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../lib/storage.js"></script>
  <script src="../lib/normalizer.js"></script>
  <script src="../lib/articles.js"></script>
  <script src="../lib/parser_strategies.js"></script>
  <script src="../lib/ingestion.js"></script>
  <script src="../lib/search.js"></script>
  <script src="../lib/caseSummary.js"></script>
  <script src="popup.js"></script>
</body>
</html>
